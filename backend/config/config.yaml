# =============================================================
# 统一配置文件 — 全局唯一配置源
# =============================================================
# 环境变量引用语法: ${VAR_NAME} 或 ${VAR_NAME:默认值}
# 敏感信息（API Key 等）请在 .env 中设置，此处仅引用

# -------------------------------------------------------------
# LLM 大模型配置
# -------------------------------------------------------------
llm:
  # 当前使用的提供商: deepseek / openai_compatible
  provider: ${LLM_PROVIDER:deepseek}

  deepseek:
    api_key: ${DEEPSEEK_API_KEY:}
    base_url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: deepseek-chat

  openai_compatible:
    api_key: ${OPENAI_COMPATIBLE_API_KEY:}
    base_url: ${OPENAI_COMPATIBLE_BASE_URL:}
    model: ${OPENAI_COMPATIBLE_MODEL:}

  dashscope:
    api_key: ${DASHSCOPE_API_KEY:}

# -------------------------------------------------------------
# 数据库
# -------------------------------------------------------------
database:
  url: ${DATABASE_URL:sqlite:///data/agri_pest.db}

# -------------------------------------------------------------
# 气象数据 API
# -------------------------------------------------------------
weather:
  api_key: ${WEATHER_API_KEY:}

# -------------------------------------------------------------
# 风险等级阈值
# -------------------------------------------------------------
risk_thresholds:
  low: 0.3
  medium: 0.6
  high: 0.8

# -------------------------------------------------------------
# 支持的作物类型
# -------------------------------------------------------------
crops:
  - 水稻
  - 小麦
  - 玉米
  - 棉花
  - 大豆
  - 蔬菜
  - 果树

# -------------------------------------------------------------
# 支持的省份
# -------------------------------------------------------------
provinces:
  - 湖南
  - 湖北
  - 江西
  - 安徽
  - 江苏
  - 浙江
  - 四川
  - 河南
  - 河北
  - 山东
  - 广东
  - 广西
  - 云南
  - 黑龙江
  - 吉林
  - 辽宁
  - 福建

# -------------------------------------------------------------
# DATAGEN 多Agent配置
# LLM 连接信息自动继承上方 llm 段，仅需设置各 agent 的 temperature
# -------------------------------------------------------------
datagen:
  agents:
    hypothesis_agent:
      temperature: 0.7
    process_agent:
      temperature: 0.5
    visualization_agent:
      temperature: 0.3
    code_agent:
      temperature: 0.2
    search_agent:
      temperature: 0.5
    report_agent:
      temperature: 0.4
    quality_review_agent:
      temperature: 0.3
    note_agent:
      temperature: 0.3
    refiner_agent:
      temperature: 0.5

# -------------------------------------------------------------
# OpenChatBI 对话式BI配置
# LLM 和数据库连接自动继承上方配置
# -------------------------------------------------------------
openchatbi:
  organization: 智慧农业病虫害预警系统
  dialect: sqlite
  catalog_store: file_system
  report_directory: ./reports
  visualization_mode: rule
  python_executor: restricted_local
